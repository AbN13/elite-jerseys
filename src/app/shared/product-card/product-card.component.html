<div class="bg-white rounded-2xl shadow-lg text-center hover:shadow-xl transition-all duration-300 overflow-hidden">
  <img
    [src]="imageUrl"
    [attr.alt]="title"
    [attr.title]="title"
    class="w-full h-48 object-cover"
  />
  <div class="p-4"> <!-- Este div agora tem o padding para o conteúdo de texto -->
    <h3 class="text-lg font-semibold text-gray-800 mb-2">{{ title }}</h3>
    <p class="text-sm text-gray-600">{{ description }}</p>
  </div>
</div>
