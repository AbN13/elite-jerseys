<section class="py-20 bg-gray-50">
  <div class="max-w-xl mx-auto px-4 text-center">
    <h1 class="text-4xl font-bold text-gray-900 mb-4">Contact Us</h1>
    <p class="text-gray-600 mb-8">
      Have questions? We're here to help. Reach out via the form below or contact us directly.
    </p>

    <form class="space-y-5">
      <input
        type="text"
        placeholder="Your Name"
        required
        class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
      <input
        type="email"
        placeholder="Your Email"
        required
        class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
      <textarea
        rows="5"
        placeholder="Your Message..."
        required
        class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
      ></textarea>
      <button
        type="submit"
        class="w-full text-white font-semibold py-3 px-8 rounded-full transition"
        style="background-color: #16c766 !important;"
      >
        Send Message
      </button>
    </form>
  </div>
</section>
