<!-- Novo container para a imagem de fundo (banner) -->
<div class="products-page-banner">
  <section class="w-full py-5 px-4 md:px-8">
    <!-- Este div agora será o "card" que envolve todo o conteúdo -->
    <div class="max-w-6xl mx-auto bg-white shadow-lg rounded-2xl p-8">
      <h2 class="text-3xl font-bold text-center mb-4">Our Jerseys</h2>
      <p class="text-center text-gray-600 mb-4 max-w-2xl mx-auto"> explore our premium collection of jerseys from the world's biggest clubs.
      </p>

      <div class="relative max-w-md mx-auto mt-6 mb-10">
        <input
          type="text"
          placeholder="Search..."
          [(ngModel)]="searchTerm"
          class="px-3 py-2 pl-10 w-full rounded-full bg-gray-100 border border-gray-300 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500"
        />
        <svg
          class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>

        <!-- Resultados da pesquisa -->
        <div *ngIf="searchTerm() && filteredProducts().length > 0"
             class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg mt-1 max-h-60 overflow-y-auto">
          <ul class="py-1">
            <li *ngFor="let product of filteredProducts()"
                (click)="goToProductDetail(product.id.toString())"
                class="px-4 py-2 cursor-pointer hover:bg-gray-100 flex items-center">
              <img [src]="product.imagem" [alt]="product.title" class="w-8 h-8 rounded-full mr-3 object-cover">
              <span>{{ product.title }}</span>
            </li>
          </ul>
        </div>
        <div *ngIf="searchTerm() && filteredProducts().length === 0"
             class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg mt-1 px-4 py-2 text-gray-500">
          Nenhum produto encontrado.
        </div>
      </div>

      <div *ngIf="products().length === 0" class="text-center text-gray-500">
        Carregando produtos...
      </div>

      <!-- O grid agora renderiza apenas os displayedProducts -->
      <div
        class="grid gap-8 grid-cols-1 sm:grid-cols-2 md:grid-cols-3"
        *ngIf="products().length > 0"
      >
        <ng-container *ngFor="let product of displayedProducts()">
          <app-product-card [product]="product"></app-product-card>
        </ng-container>
      </div>

      <!-- O botão "See more..." só aparece se houver produtos ocultos -->
      <div *ngIf="shouldShowSeeMoreButton() || showMoreProducts()" class="text-center mt-10 mb-10">
        <button 
          (click)="toggleMoreProducts()"
          class="bg-green-600 text-white px-6 py-3 rounded-full hover:bg-green-700 transition-colors">
          {{ showMoreProducts() ? 'Ver menos...' : 'Ver mais...' }}
        </button>
      </div>
    </div>
  </section>
</div>
